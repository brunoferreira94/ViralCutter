name: viralcutter

services:
  webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: viralcutter:cpu
    profiles: ["webui"]
    command: ["python", "webui/app.py"]
    ports:
      - "7860:7860"
    env_file:
      - ./.env
    volumes:
      - ./VIRALS:/app/VIRALS
      - ./models:/app/models
      - ./api_config.json:/app/api_config.json
      - ./prompt.txt:/app/prompt.txt
    environment:
      - PYTHONUNBUFFERED=1
      - VIRALCUTTER_HOST=0.0.0.0
      - LANG=pt_BR.UTF-8
      - LC_ALL=pt_BR.UTF-8

  cli:
    build:
      context: .
      dockerfile: Dockerfile
    image: viralcutter:cpu
    profiles: ["cli"]
    entrypoint: ["python", "main_improved.py"]
    env_file:
      - ./.env
    volumes:
      - ./VIRALS:/app/VIRALS
      - ./models:/app/models
      - ./api_config.json:/app/api_config.json
      - ./prompt.txt:/app/prompt.txt
    environment:
      - PYTHONUNBUFFERED=1
      - VIRALCUTTER_HOST=0.0.0.0
      - LANG=pt_BR.UTF-8
      - LC_ALL=pt_BR.UTF-8

  webui-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: viralcutter:gpu
    profiles: ["gpu", "webui-gpu"]
    command: ["python", "webui/app.py"]
    ports:
      - "7860:7860"
    env_file:
      - ./.env
    volumes:
      - ./VIRALS:/app/VIRALS
      - ./models:/app/models
      - ./api_config.json:/app/api_config.json
      - ./prompt.txt:/app/prompt.txt
    environment:
      - PYTHONUNBUFFERED=1
      - LANG=pt_BR.UTF-8
      - LC_ALL=pt_BR.UTF-8
    # GPU config moved to docker-compose.gpu.yml to avoid validation errors

  cli-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: viralcutter:gpu
    profiles: ["gpu", "cli-gpu"]
    entrypoint: ["python", "main_improved.py"]
    env_file:
      - ./.env
    volumes:
      - ./VIRALS:/app/VIRALS
      - ./models:/app/models
      - ./api_config.json:/app/api_config.json
      - ./prompt.txt:/app/prompt.txt
    environment:
      - PYTHONUNBUFFERED=1
      - LANG=pt_BR.UTF-8
      - LC_ALL=pt_BR.UTF-8
    # GPU config moved to docker-compose.gpu.yml to avoid validation errors
